<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --main: #FFB7C5; --bg: #FFFDF9; --accent: #A0D8DE; --text: #5A5A5A; }
    body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: var(--text); }
    .container { background: white; width: 90%; max-width: 460px; border-radius: 40px; padding: 35px; box-shadow: 0 10px 0 #F0E6D2; border: 4px solid #F5EBD7; text-align: center; }
    .page { display: none; }
    .active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 介紹頁 */
    .intro-box { font-size: 1.25rem; line-height: 1.8; color: #666; margin: 25px 0; background: #FFF9F0; padding: 25px; border-radius: 25px; border: 2px dashed #FFD97D; }

    /* 題目句子：四年級適用的顯眼大字體 */
    .bubble { 
      background: #E0F2F1; border: 4px solid var(--accent); border-radius: 25px; padding: 30px; 
      font-size: 1.7rem; font-weight: bold; line-height: 1.6; margin-bottom: 25px; color: #004D40; 
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
    }

    /* 圓形調色盤：縮小至 120px */
    .picker-container { 
      position: relative; width: 120px; height: 120px; margin: 15px auto; 
      border-radius: 50%; border: 6px solid #FFF; box-shadow: 0 6px 15px rgba(0,0,0,0.1); overflow: hidden; 
    }
    input[type="color"] { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; border: none; }

    textarea { width: 100%; height: 90px; border-radius: 20px; border: 2px solid #EEE; padding: 15px; font-size: 1.15rem; margin-bottom: 20px; box-sizing: border-box; outline: none; resize: none; }
    button { background: var(--main); color: white; border: none; padding: 15px 45px; font-size: 1.35rem; border-radius: 60px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #E5A4B1; transition: 0.2s; }
    button:active { transform: scale(0.98); }

    .feedback-container { text-align: left; background: #FFF9E6; padding: 25px; border-radius: 25px; border-left: 10px solid #FFD97D; font-size: 1.2rem; line-height: 1.8; margin-bottom: 25px; white-space: pre-wrap; }
  </style>
</head>
<body>

<div class="container">
  <div id="p1" class="page active">
    <h1 style="color: #FF85A1; font-size: 2.2rem; margin-top: 0;">🎨 文字調色盤</h1>
    <div class="intro-box">先細細閱讀句子，<br>再調製出最適合它的顏色！</div>
    <div style="font-size: 5rem; margin-bottom: 30px;">🌈</div>
    <button onclick="startApp()">進入實驗室</button>
  </div>

  <div id="p2" class="page">
    <div id="qBox" class="bubble">載入題目中...</div>
    <p style="font-weight: bold;">✨ 轉動圓盤選一個顏色：</p>
    <div class="picker-container"><input type="color" id="cInput" value="#FFD97D"></div>
    <textarea id="rInput" placeholder="寫下你的想法吧..."></textarea>
    <button id="submitBtn" onclick="submitData()">完成調色</button>
  </div>

  <div id="p3" class="page">
    <h2 style="color: var(--main); font-size: 1.8rem;">🌟 老師的點評</h2>
    <div id="fBox" class="feedback-container">老師正在細細品味中...</div>
    <div style="background: #F5F0FF; padding: 20px; border-radius: 20px; text-align: left; margin-bottom: 30px;">
      <strong>📝 佳句抄寫：</strong><br><span id="copyText" style="line-height: 1.8;"></span>
    </div>
    <button onclick="resetApp()" style="background: var(--accent); box-shadow: 0 4px 0 #8ABFC4;">再試一題</button>
  </div>
</div>

<script>
  let curS = "";

  function toPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // 加上保護機制，確保 google 物件已載入
  function startApp() {
    toPage('p2');
    if (typeof google !== 'undefined') {
      google.script.run.withSuccessHandler(res => {
        curS = res;
        document.getElementById('qBox').innerText = res;
        document.getElementById('copyText').innerText = res;
      }).getQuestion();
    } else {
      document.getElementById('qBox').innerText = "系統還在熱身，請稍微等一下再重新點擊一次按鈕喔！";
    }
  }

  function submitData() {
    const color = document.getElementById('cInput').value;
    const reason = document.getElementById('rInput').value;
    
    // 取代 alert，直接在輸入框給提示，避免中斷體驗
    if(!reason) {
       document.getElementById('rInput').placeholder = "老師想聽聽你的原因喔！";
       document.getElementById('rInput').focus();
       return;
    }

    toPage('p3');
    document.getElementById('fBox').innerHTML = "老師正在閱卷中，請稍候...";
    
    google.script.run.withSuccessHandler(res => {
      document.getElementById('fBox').innerText = res;
    }).getFeedback(curS, color, reason);
  }

  function resetApp() {
    document.getElementById('rInput').value = "";
    toPage('p1');
  }
</script>
</body>
</html>
